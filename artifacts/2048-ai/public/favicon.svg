<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="nodeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="textGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlowFilter" x="-80%" y="-80%" width="360%" height="360%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark tile base -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="url(#bg)"/>

  <!-- Amber border ring -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.45"/>

  <!-- Neural grid lines — horizontal & vertical -->
  <line x1="13" y1="13" x2="51" y2="13" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.18"/>
  <line x1="13" y1="32" x2="51" y2="32" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.10"/>
  <line x1="13" y1="51" x2="51" y2="51" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.18"/>
  <line x1="13" y1="13" x2="13" y2="51" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.18"/>
  <line x1="32" y1="13" x2="32" y2="51" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.10"/>
  <line x1="51" y1="13" x2="51" y2="51" stroke="#f59e0b" stroke-width="0.6" stroke-opacity="0.18"/>

  <!-- Diagonal neural connections -->
  <line x1="13" y1="13" x2="51" y2="51" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.12"/>
  <line x1="51" y1="13" x2="13" y2="51" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.12"/>

  <!-- Corner nodes — dim -->
  <circle cx="13" cy="13" r="2.2" fill="#f59e0b" fill-opacity="0.4"/>
  <circle cx="51" cy="13" r="2.2" fill="#f59e0b" fill-opacity="0.4"/>
  <circle cx="13" cy="51" r="2.2" fill="#f59e0b" fill-opacity="0.4"/>

  <!-- Active node — bottom-right glows (AI "thinking" corner) -->
  <circle cx="51" cy="51" r="5" fill="url(#nodeGlow)" filter="url(#nodeGlowFilter)"/>
  <circle cx="51" cy="51" r="2.5" fill="white"/>

  <!-- "2048" — amber glow text -->
  <text
    x="29"
    y="36"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="15"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-0.5"
    fill="#fbbf24"
    filter="url(#textGlow)"
  >2048</text>

  <!-- "AI" micro-label top-right -->
  <text
    x="52"
    y="10"
    font-family="'Arial Black', Arial, sans-serif"
    font-size="5.5"
    font-weight="900"
    text-anchor="middle"
    fill="#f59e0b"
    fill-opacity="0.75"
    letter-spacing="0.3"
  >AI</text>
</svg>
