kind = "web"
previewPath = "/"
title = "2048 AI Agent"
version = "1.0.0"
id = "artifacts/2048-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20370

[services.development]
run = "pnpm --filter @workspace/2048-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/2048-ai", "run", "build" ]
publicDir = "artifacts/2048-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20370"
BASE_PATH = "/"
